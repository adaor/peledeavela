<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimento Pele de Avelã</title>
    <style>
        /* Configuração Geral */
        body {
            background-color: #fdf5e6;
            color: #4a3728;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            flex: 1;
        }

        h1 {
            color: #cd7f32;
            font-size: 3rem;
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitulo {
            font-size: 1.2rem;
            font-style: italic;
            color: #8c5a3c;
            margin-bottom: 30px;
        }

        .imagem-placeholder {
            margin: 30px auto;
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .imagem-placeholder img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Estilo do Botão Principal e do Formulário */
        .botao {
            display: inline-block;
            background-color: #cd7f32;
            color: white !important;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
        }

        .botao:hover {
            background-color: #8c5a3c;
        }

        /* Estilo do Card do Formulário */
        .form-card {
            margin-top: 50px;
            padding: 40px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: left;
            border: 1px solid #eee;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #4a3728;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Rodapé */
        .rodape {
            background-color: #3d2b1f;
            color: #f4ece4;
            padding: 40px 20px;
            margin-top: 60px;
            width: 100%;
        }

        .redes-sociais a {
            color: #f4ece4;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .form-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Movimento Pele de Avelã</h1>
        <p class="subtitulo">Sua beleza em evidência</p>
        
        <div class="imagem-placeholder"> 
            <img src="imagem/banner1.jpg" alt="Pele de Avelã"> 
        </div>

        <div class="form-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="color: #4a3728;">Faça Parte</h2>
                <p style="color: #8c5a3c; font-style: italic;">Deixe seus dados para conhecer o conceito</p>
            </div>

            <form action="https://formsubmit.co/peledeavela@gmail.com" method="POST">
                <input type="hidden" name="_next" value="https://adaor.github.io/peledeavela/">
                <input type="hidden" name="_captcha" value="false">

                <div class="input-group">
                    <label>Seu Nome</label>
                    <input type="text" name="nome" class="input-field" placeholder="Ex: Maria Silva" required>
                </div>

                <div class="input-group">
                    <label>WhatsApp ou E-mail</label>
                    <input type="text" name="contato" class="input-field" placeholder="(00) 00000-0000" required>
                </div>

                <button type="submit" class="botao" style="width: 100%;">
                    ENVIAR E CONHECER O CONCEITO
                </button>
            </form>
        </div>
    </div>

    <footer class="rodape">
        <p>Valorizando a beleza e o conceito natural.</p>
        <div class="redes-sociais">
            <a href="https://www.instagram.com/peledeavela" target="_blank">@peledeavela</a>
            <a href="mailto:peledeavela@gmail.com">peledeavela@gmail.com</a>
        </div>
        <p style="font-size: 0.75rem; opacity: 0.6; margin-top: 20px;">&copy; 2026 Movimento Pele de Avelã.</p>
    </footer>

</body>
</html>
